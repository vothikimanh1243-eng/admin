<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #3b82f6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 30px; }
        .container { display: flex; gap: 20px; width: 900px; }
        .box { background: var(--panel); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 15px; background: #000; border: 2px solid #333; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 12px; background: #333; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--accent); }
        .danger { background: #991b1b; }
        #chat-box { height: 300px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #333; padding: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" style="flex: 2;">
            <h2>Admin - <span id="my-id" style="color:var(--accent)">...</span></h2>
            <video id="remote-video" autoplay playsinline></video>
            <div class="controls">
                <button onclick="sendCmd('toggle-cam')">📷 Cam</button>
                <button onclick="sendCmd('toggle-mic')">🎙️ Mic</button>
                <button onclick="sendCmd('swap-cam')">🔄 Đổi Cam</button>
                <button class="danger" onclick="sendCmd('disconnect')">❌ Ngắt Kết Nối</button>
            </div>
        </div>
        <div class="box" style="flex: 1;">
            <h3>Chat</h3>
            <div id="chat-box"></div>
            <input id="chat-input" class="chat-input" placeholder="Nhập tin nhắn..." style="width: 80%; padding: 8px;">
            <button onclick="sendMsg()">Gửi</button>
        </div>
    </div>
    <script>
        const randomID = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(randomID);
        let conn;
        peer.on('open', (id) => document.getElementById('my-id').innerText = id);
        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => document.getElementById('remote-video').srcObject = s); });
        peer.on('connection', (c) => { 
            conn = c; 
            conn.on('data', (data) => {
                if(data.type === 'chat') document.getElementById('chat-box').innerHTML += `<p>Phụ: ${data.val}</p>`;
            });
        });
        function sendCmd(cmd) { 
            if(conn) conn.send({type: 'cmd', val: cmd}); 
            if(cmd === 'disconnect') window.location.reload();
        }
        function sendMsg() {
            const input = document.getElementById('chat-input');
            conn.send({type: 'chat', val: input.value});
            document.getElementById('chat-box').innerHTML += `<p>Bạn: ${input.value}</p>`;
            input.value = '';
        }
    </script>
</body>
</html>
