<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .video-box { width: 640px; height: 360px; background: #000; border-radius: 15px; border: 2px solid #333; transition: 0.4s; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; background: #333; color: white; transition: 0.3s; font-weight: bold; }
        button:hover { background: #555; }
        button.danger { background: #d9534f; }
        #my-id { color: #00d4ff; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
<h1>Bảng Điều Khiển Admin</h1>
<p>ID kết nối: <span id="my-id">Đang khởi tạo...</span></p>
<video id="remote-video" class="video-box" autoplay playsinline></video>

<div class="controls">
    <button onclick="sendCmd('toggle-cam')">📷 Cam</button>
    <button onclick="sendCmd('toggle-mic')">🎙️ Mic</button>
    <button onclick="toggleLayout()">📱/💻 Layout</button>
    <button class="danger" onclick="sendCmd('disconnect')">❌ Ngắt</button>
</div>

<script>
    const randomID = Math.floor(100000 + Math.random() * 900000).toString();
    const peer = new Peer(randomID);
    let conn;

    peer.on('open', (id) => document.getElementById('my-id').innerText = id);
    peer.on('call', (call) => { call.answer(); call.on('stream', (s) => document.getElementById('remote-video').srcObject = s); });
    peer.on('connection', (c) => { conn = c; });

    function sendCmd(cmd) { if(conn) conn.send({type: 'cmd', val: cmd}); }
    function toggleLayout() {
        const v = document.getElementById('remote-video');
        v.style.width = v.style.width === '360px' ? '640px' : '360px';
        v.style.height = v.style.height === '640px' ? '360px' : '640px';
    }
</script>
</body>
</html>
