
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Giám Sát (Admin)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- Thư viện tạo mã QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #qrcode { display: inline-block; margin: 20px; }
        .id-box { font-size: 24px; font-weight: bold; color: #0d6efd; background: #e7f1ff; padding: 10px; border-radius: 8px; display: inline-block; letter-spacing: 2px; margin: 10px 0; }
        video { width: 100%; max-height: 400px; background: black; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bảng Điều Khiển Giám Sát (Admin)</h2>
    
    <div id="setup-zone">
        <p>Sẵn sàng kết nối. Sử dụng máy phụ quét mã QR hoặc nhập ID bên dưới:</p>
        <!-- Hiển thị ID bằng số để nhập từ xa -->
        <div>Mã kết nối từ xa:</div>
        <div id="admin-id-display" class="id-box">Đang tạo...</div>
        
        <div id="qrcode"></div>
    </div>

    <!-- Khung hiển thị Video từ máy phụ truyền về -->
    <video id="remote-video" autoplay playsinline></video>
</div>

<script>
    // Tạo 1 ID ngẫu nhiên gồm 6 chữ số để người dùng ở xa dễ nhập
    const customAdminId = 'admin-' + Math.floor(100000 + Math.random() * 900000);
    
    // Khởi tạo Peer với ID cố định này
    const peer = new Peer(customAdminId);

    peer.on('open', (id) => {
        // Hiển thị chuỗi ID rút gọn cho người dùng (chỉ hiển thị phần số)
        const displayId = id.replace('admin-', '');
        document.getElementById('admin-id-display').innerText = displayId;

        // Tạo mã QR chứa toàn bộ ID đầy đủ để máy phụ quét phát ăn ngay
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: id,
            width: 200,
            height: 200
        });
    });

    // Lắng nghe cuộc gọi từ máy phụ gửi tới
    peer.on('call', (call) => {
        call.answer(); // Đồng ý nhận cuộc gọi
        
        call.on('stream', (remoteStream) => {
            // Ẩn vùng QR và ID đi, hiện video lên
            document.getElementById('setup-zone').style.display = 'none';
            const video = document.getElementById('remote-video');
            video.style.display = 'block';
            video.srcObject = remoteStream;
        });
    });
</script>
</body>
</html>
