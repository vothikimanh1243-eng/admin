<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        .video-box { width: 400px; height: 225px; background: #000; border-radius: 10px; }
        .led { padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; }
        .on { background: #1e4620; color: #4caf50; }
        .off { background: #4a1c1c; color: #f44336; }
    </style>
</head>
<body>
    <h2>Admin - ID: <span id="my-id">...</span></h2>
    <video id="remote-video" class="video-box" autoplay playsinline></video>
    
    <div>
        <span id="led-cam" class="led off">Cam Phụ: Tắt</span>
        <span id="led-mic" class="led off">Mic Phụ: Tắt</span>
    </div>

    <div class="controls">
        <button onclick="sendCmd('toggle-cam')">📷 Bật/Tắt Cam Phụ</button>
        <button onclick="sendCmd('toggle-mic')">🎙️ Bật/Tắt Mic Phụ</button>
        <button onclick="sendCmd('swap-cam')">🔄 Đổi Cam Phụ</button>
    </div>

    <script>
        const randomID = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(randomID);
        let conn;

        peer.on('open', (id) => document.getElementById('my-id').innerText = id);
        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => document.getElementById('remote-video').srcObject = s); });
        peer.on('connection', (c) => { 
            conn = c; 
            conn.on('data', (data) => {
                if(data.type === 'status') {
                    document.getElementById('led-cam').className = `led ${data.cam ? 'on' : 'off'}`;
                    document.getElementById('led-cam').innerText = data.cam ? 'Cam Phụ: Bật' : 'Cam Phụ: Tắt';
                    document.getElementById('led-mic').className = `led ${data.mic ? 'on' : 'off'}`;
                    document.getElementById('led-mic').innerText = data.mic ? 'Mic Phụ: Bật' : 'Mic Phụ: Tắt';
                }
            });
        });

        function sendCmd(cmd) { if(conn) conn.send({type: 'cmd', val: cmd}); }
    </script>
</body>
</html>
