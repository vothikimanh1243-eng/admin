<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --on: #22c55e; --off: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .wrapper { display: flex; gap: 20px; width: 1000px; }
        .box { background: var(--panel); padding: 25px; border-radius: 20px; flex: 2; border: 1px solid #333; }
        video { width: 100%; border-radius: 15px; border: 2px solid #444; background: #000; }
        .led-group { display: flex; gap: 15px; margin: 20px 0; }
        .led { padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .led.on { background: var(--on); color: #064e3b; }
        .led.off { background: var(--off); color: #7f1d1d; }
        .chat-panel { flex: 1; background: var(--panel); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        #chat-box { height: 350px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #333; }
        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #7f1d1d; color: white; width: 100%; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="box">
            <h2>Admin - <span id="my-id" style="color:#3b82f6">...</span></h2>
            <video id="remote-video" autoplay playsinline></video>
            <div class="led-group">
                <span id="led-cam" class="led off">Cam: Tắt</span>
                <span id="led-mic" class="led off">Mic: Tắt</span>
            </div>
            <button onclick="location.reload()">❌ Ngắt Kết Nối</button>
        </div>
        <div class="btn-grid">
    <button onclick="sendCmd('toggle-cam')">📷 Cam Phụ</button>
    <button onclick="sendCmd('toggle-mic')">🎙️ Mic Phụ</button>
    <button onclick="sendCmd('swap-cam')">🔄 Đổi Cam Phụ</button>
    <button onclick="location.reload()" style="background:#7f1d1d">❌ Ngắt</button>
</div>
        <div class="chat-panel">
            <h3>Chat</h3>
            <div id="chat-box"></div>
            <input id="chat-input" style="width:70%; padding:8px" placeholder="Nhắn...">
            <button onclick="sendMsg()" style="background:#3b82f6; width:auto">Gửi</button>
        </div>
    </div>
    <script>
        function sendCmd(cmd) { 
        if(conn) conn.send({type: 'cmd', val: cmd}); 
    }
        const peer = new Peer(Math.floor(100000 + Math.random() * 900000).toString());
        let conn;
        peer.on('open', id => document.getElementById('my-id').innerText = id);
        peer.on('call', c => { c.answer(); c.on('stream', s => document.getElementById('remote-video').srcObject = s); });
        peer.on('connection', c => { 
            conn = c;
            conn.on('data', d => {
                if(d.type === 'status') {
                    document.getElementById('led-cam').className = `led ${d.cam ? 'on' : 'off'}`;
                    document.getElementById('led-cam').innerText = d.cam ? 'Cam: Bật' : 'Cam: Tắt';
                    document.getElementById('led-mic').className = `led ${d.mic ? 'on' : 'off'}`;
                    document.getElementById('led-mic').innerText = d.mic ? 'Mic: Bật' : 'Mic: Tắt';
                }
                if(d.type === 'chat') document.getElementById('chat-box').innerHTML += `<p>Phụ: ${d.val}</p>`;
            });
        });
        function sendMsg() { const i = document.getElementById('chat-input'); conn.send({type:'chat', val: i.value}); document.getElementById('chat-box').innerHTML += `<p>Bạn: ${i.value}</p>`; i.value=''; }
    </script>
</body>
</html>
